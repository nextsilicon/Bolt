display_information:
  name: Bolt
  description: A bot for Wolt group orders
features:
  bot_user:
    display_name: Bolt
    always_online: true
  slash_commands:
    - command: /add-user
      description: Add a custom user to the DB
      usage_hint: '"Lorem Ipsum" @Lorem'
      should_escape: false
  unfurl_domains:
    - wolt.com
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - chat:write
      - groups:history
      - im:history
      - links:read
      - reactions:read
      - users:read
      - users:read.email
      - reactions:write
      - commands
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - link_shared
      - reaction_added
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
